name: Test Hugo Latest Version

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  hugo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          check-latest: true
      # -
      #   name: Install Dependencies
      #   run: npm install && npm i yarn && yarn && npm install -D @babel/cli @babel/core @babel/preset-env browserslist clipboard cssnano postcss postcss-cli postcss-import postcss-mixins postcss-nested postcss-preset-env postcss-url
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      # Caching is intentionally DISABLED for this workflow. No actions/cache
      # step is used, and Hugo runs with --ignoreCache --renderToMemory so the
      # "test latest version" job always performs a clean, uncached build to
      # surface regressions and deprecations early.
      - name: Run Hugo
        run: hugo --cleanDestinationDir --gc -D -E -F --ignoreCache --renderToMemory --minify --panicOnWarning --logLevel info --config /home/runner/work/simeononsecurity.ch/simeononsecurity.ch/config/language/en/config.toml



