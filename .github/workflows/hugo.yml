name: Test Hugo Latest Version

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  hugo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          check-latest: true
      # -
      #   name: Install Dependencies
      #   run: npm install && npm i yarn && yarn && npm install -D @babel/cli @babel/core @babel/preset-env browserslist clipboard cssnano postcss postcss-cli postcss-import postcss-mixins postcss-nested postcss-preset-env postcss-url
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      # Caching is intentionally DISABLED for this workflow. No actions/cache
      # step is used, and Hugo runs with --ignoreCache so the "test latest
      # version" job always reprocesses every resource and performs a clean,
      # uncached build to surface regressions and deprecations early.
      # NOTE: --renderToMemory is intentionally NOT used here. On this large
      # 17-language site it forced every processed image to be held in RAM,
      # driving 40GB+ allocations and heavy GC thrash. Rendering to disk keeps
      # the clean build while staying far faster and lighter on memory.
      - name: Run Hugo
        run: hugo --cleanDestinationDir --gc -D -E -F --ignoreCache --minify --panicOnWarning --logLevel info --config /home/runner/work/simeononsecurity.ch/simeononsecurity.ch/config/language/en/config.toml




